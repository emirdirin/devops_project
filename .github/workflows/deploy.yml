name: devops_project
# This workflow only works when a push is made to the main branch.
on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 3: Configure Gradle Settings and Enable Caching
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4: Compile Project with Gradle Wrapper.
      - name: Build with Gradle Wrapper
        run: ./gradlew build

      # 5: List build files.
      - name: List files
        run: ls -R build

      # 6: Login to DockerHub with GitHub actions.
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7: Create Docker image and push it to the DockerHub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/myapp5:latest