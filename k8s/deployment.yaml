apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
  labels:
    app: spring-boot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
    spec:
      containers:
        - name: spring-boot-app
          image: emirdirin/devops_project4_image
          env:  # look at the application.properties file
            - name: DB_HOST
              value: "mysql-service"   # The name of the service in Kubernetes
            - name: DB_NAME
              value: "devops_db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "2569"
          ports:
            - containerPort: 8080
          imagePullPolicy: Always

          #